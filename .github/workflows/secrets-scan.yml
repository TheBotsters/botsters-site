# secrets-scan.yml — Scan for secrets and credentials in the codebase
# Using TruffleHog (free, no org license required unlike Gitleaks).
# TODO(security): Pin action ref to commit SHA before Phase F cutover.
name: secrets-scan

on:
  pull_request:
  push:
    branches: [main]

jobs:
  secrets-scan:
    name: Secret scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
