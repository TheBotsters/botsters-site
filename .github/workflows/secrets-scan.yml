# secrets-scan.yml — Scan for secrets and credentials in the codebase
# TODO(security): Pin gitleaks action to commit SHA before Phase F cutover.
name: secrets-scan

on:
  pull_request:
  push:
    branches: [main]

jobs:
  secrets-scan:
    name: Secret scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE not required for public/org repos on free tier
