# lint-js.yml — Enforce JS-only policy and basic lint
# TODO(security): Pin action refs to commit SHAs before Phase F cutover.
# See: https://socket.dev/blog/trivy-under-attack-again-github-actions-compromise
name: lint-js

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-js:
    name: Lint (JS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint on JS/MJS files
        run: |
          JS_FILES=$(find src -type f \( -name '*.js' -o -name '*.mjs' \) \
            ! -path '*/node_modules/*' ! -path '*/dist/*')
          if [ -z "$JS_FILES" ]; then
            echo "No .js/.mjs files found — check passes."
            exit 0
          fi
          # Write a minimal eslint config to temp
          cat > /tmp/.eslintrc.json << 'ESLINTEOF'
          {
            "env": { "browser": true, "es2022": true, "node": true },
            "parserOptions": { "ecmaVersion": 2022, "sourceType": "module" },
            "rules": {
              "no-eval": "error",
              "no-implied-eval": "error",
              "no-new-func": "error"
            }
          }
          ESLINTEOF
          echo "$JS_FILES" | xargs npx --yes eslint@8 --no-eslintrc -c /tmp/.eslintrc.json
