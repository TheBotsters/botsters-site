# link-check.yml — Check for broken links in the built site
# TODO(security): Pin lychee action to commit SHA before Phase F cutover.
name: link-check

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly on Monday 09:00 UTC — catches external link rot
    - cron: '0 9 * * 1'

jobs:
  link-check:
    name: Link checker (Lychee)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build site
        run: npm ci && npm run build
        env:
          PB_URL: https://cms-staging.botstersdev.com

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --root-dir ${{ github.workspace }}/dist
            --exclude 'mailto:'
            --exclude 'https://localhost'
            --exclude 'http://localhost'
            --timeout 20
            --max-retries 3
            ${{ github.workspace }}/dist/**/*.html
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
